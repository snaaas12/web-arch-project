# --- HTTP → HTTPS редирект ---
server {
    listen 80;
    server_name api.cinema.local;
    return 301 https://$host$request_uri;
}

# --- HTTPS: FastAPI (Uvicorn) + WebSocket ---
server {
    listen 443 ssl;
    server_name api.cinema.local;

    # SSL сертификаты
    ssl_certificate /etc/nginx/ssl/cinema.crt;
    ssl_certificate_key /etc/nginx/ssl/cinema.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Логи
    access_log /var/log/nginx/api_access.log;
    error_log /var/log/nginx/api_error.log;

    # Обычные REST API запросы
    location / {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для API
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket соединения
    location /ws/ {
        proxy_pass http://fastapi:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Держим соединение открытым для WebSocket
        proxy_read_timeout 86400;
    }

    # Статические файлы API (документация)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        proxy_pass http://fastapi:8000;
        expires 1d;
    }
}