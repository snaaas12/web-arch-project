# --- HTTP → HTTPS редирект ---
server {
    listen 80;
    server_name cinema.local www.cinema.local;
    return 301 https://$host$request_uri;
}

# --- HTTPS: Laravel (PHP-FPM) ---
server {
    listen 443 ssl;
    server_name cinema.local www.cinema.local;

    # SSL сертификаты
    ssl_certificate /etc/nginx/ssl/cinema.crt;
    ssl_certificate_key /etc/nginx/ssl/cinema.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/html/public;
    index index.php index.html;

    # Логи
    access_log /var/log/nginx/cinema_access.log;
    error_log /var/log/nginx/cinema_error.log;

    # Основное приложение
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Запрет доступа к скрытым файлам
    location ~ /\.ht {
        deny all;
    }

    # Статические файлы с кэшированием
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}